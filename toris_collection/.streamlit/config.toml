# ローカル開発で `cd toris_collection && streamlit run app.py` する場合に読まれる設定。
# Streamlit Community Cloud向けの同内容はリポジトリルートの `.streamlit/config.toml` に複製済み
# (Cloud はリポジトリルートを作業ディレクトリとして起動するため)。
#
# PWA化(TWA準備)の下準備: manifest.json / sw.js を静的配信するために必要。
[server]
enableStaticServing = true
# 2026-07-13 重大インシデント対応: Android(Capacitor WebView)からのWebSocket接続が
# check_origin()のOrigin許可判定(enableCORS既定True)で拒否され、起動直後に白紙で
# 固まる不具合が発生。本アプリは外部に公開APIを持たない単一オリジン構成(Renderの
# このURLのみから配信)のため、CORSを無効化してもセキュリティ上の低下は無い。
enableCORS = false
